<html>
<head>
    <title>Attendance Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="box">
    <h1>Attendance Predictor</h1>

    <form method="POST">
        <input type="number" name="total" placeholder="Total Classes" required>
        <input type="number" name="attended" placeholder="Attended Classes" required>

        <button type="submit">Predict</button>
    </form>

    <h2>{{ result }}</h2>

</div>

</body>
</html>
